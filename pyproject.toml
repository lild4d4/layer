[project]
name = "layer"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "cocotb>=2.0.1",
    "cocotbext-spi",
    "pyftdi>=0.57.1",
    "pytest>=9.0.2",
    "pytest>=9.0.2",
    "pycryptodome>=3.23.0",
