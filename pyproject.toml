    "pre-commit>=4.5.1",
]

[tool.pytest.ini_options]
norecursedirs = ["build", "dist", "librelane", "pdk"]

[tool.uv.sources]
cocotbext-spi = { git = "https://github.com/schang412/cocotbext-spi.git" }
