meta:
  version: 3
  flow: Chip
  substituting_steps:
    # Magic reports some overlaps which can be ignored
    Checker.IllegalOverlap: null
    # Not working correctly
    KLayout.SealRing: null
    # Disable magic DRC
    Magic.DRC: null
    Checker.MagicDRC: null
    # Disable KLayout density check
    KLayout.Density: null
    Checker.KLayoutDensity: null

    # you can uncomment this for the flow to be faster. Comment it again in the final run.
    KLayout.DRC: null
    Checker.KLayoutDRC: null

    # you can uncomment this for the flow to be faster. Comment it again in the final run.
    KLayout.Antenna: null
    Checker.KLayoutAntenna: null

    # you can uncomment this for the flow to be faster. Comment it again in the final run.
    OpenROAD.IRDropReport: null
    KLayout.XOR: null
    Netgen.LVS: null
    Checker.LVS: null

DESIGN_NAME: top
VERILOG_FILES:
  - src/top.sv
  - src/chip.sv
  - ../SPI/src/spi_top.sv
  - ../SPI/src/spi_arb.sv
  - ../SPI/src/spi_ctrl.sv
  - ../SPI/src/spi_master.sv
  - ../SPI/src/eeprom_ctrl.sv
  - ../SPI/src/eeprom_spi.sv
  - ../SPI/src/mfrc_top.sv
  - ../SPI/src/mfrc_core.sv
  - ../SPI/src/mfrc_reg_if.sv
USE_SLANG: true

CLOCK_PERIOD: 10
CLOCK_PORT: clk_PAD

FP_SIZING: absolute
DIE_AREA: [0, 0, 2400, 2400]
CORE_AREA: [358.00, 358.00, 842, 842]

PDN_CORE_RING: true
PDN_CORE_RING_CONNECT_TO_PADS: true
MAGIC_EXT_UNIQUE: "notopports"
PDN_ENABLE_PINS: false
PDN_CORE_RING_VWIDTH: 15
PDN_CORE_RING_HWIDTH: 15
PDN_VPITCH: 50
PDN_HPITCH: 50
PDN_VWIDTH: 3.5
PDN_HWIDTH: 3.5
PAD_SITE_NAME: sg13g2_ioSite
PAD_CORNER_SITE_NAME: sg13g2_ioSite

VDD_NETS: ["VDD"]
GND_NETS: ["VSS"]

GRT_ALLOW_CONGESTION: true
IGNORE_DISCONNECTED_MODULES:
  - bondpad_70x70
EXTRA_GDS:
  - dir::bondpad/bondpad_70x70.gds
EXTRA_LEFS:
  - dir::bondpad/bondpad_70x70.lef

# Pinout based on user requirements:
# Pin1: rst (input)
# Pin2: sys_clk (input)
# Pin13: cs_1 (spi chip select 1 - AT25010B)
# Pin14: cs_2/cs_0 (spi chip select 2 - MFRC522)
# Pin15: spi_miso (input to chip)
# Pin16: spi_mosi (output from chip)
# Pin17: spi_sclk (output from chip)
# Pin23: status_busy (output)

PAD_WEST:
  - rst_pad
  - clk_pad

PAD_SOUTH:
  [
    "vdd_pads\\[0\\].vdd_pad",
    "vss_pads\\[0\\].vss_pad",
    "iovdd_pads\\[0\\].iovdd_pad",
    "iovss_pads\\[0\\].iovss_pad",
  ]

PAD_EAST:
  - cs_1_pad
  - cs_0_pad
  - spi_mosi_pad
  - spi_sclk_pad
  - status_busy_pad

PAD_NORTH:
  - spi_miso_pad
